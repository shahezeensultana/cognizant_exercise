<!DOCTYPE html>
<html>
<head>
  <title>Debugging with Dev Tools</title>
  <style>
    body{
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
    margin-top: 50px;
    }
    .box{
        width: 200px;
        height: 200px;
        background-color: lightblue;
        margin: 20px auto;
        line-height: 200px;
        border: 2px solid black;
        border-radius: 8px;
        font-weight: bold;
    }
    button{
        padding: 10px 20px;
        background-color: blue;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover{
        background-color: darkblue;
    }
    #msg{
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Chrome DevTools Debugging Demo</h2>
  <div class="box" id="box">Click Me</div>
  <button onclick="changeColor()">Change Color</button>
  <p id="msg"></p>
  <script>
    console.log("Page Loaded Successfully");
    function changeColor() {
      console.log("Button clicked");
      let box = document.getElementById("box");
      let colors = ["red", "green", "yellow", "orange"];
      let randomIndex = Math.floor(Math.random() * colors.length);
      console.log("Selected color:", colors[randomIndex]);
      box.style.backgroundColor = colors[randomIndex];
      document.getElementById("msg").innerText =
        "Color changed to " + colors[randomIndex];
    }
  </script>
</body>
</html>
